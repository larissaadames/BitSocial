<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBit - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <header class="app-header">
        <div class="header-container">
            <a href="index.html" class="logo-section logo-link">
                <span class="logo-text">Social</span>
                <img src="../img/bitLampada.png" alt="Bug BitSocial" class="logo-icon-img">
            </a>
            <div class="search-section">
                <input type="text" placeholder="Pesquisar" class="search-bar">
            </div>
            <a href="../perfil/perfil.html" class="user-section user-link">
                <div class="header-user-avatar" id="header-avatar"></div>
            </a>
        </div>
    </header>

    <main class="main-content">
        <div class="home-grid">
            
            <nav class="nav-sidebar">
                <div class="nav-item active" data-target="home">
                    <span class="nav-icon">🏠</span> Página Inicial
                </div>
                <div class="nav-item" data-target="saved">
                    <span class="nav-icon">🔖</span> Salvos
                </div>
                <div class="nav-placeholder"></div>
                <div class="nav-placeholder"></div>
            </nav>

            <section class="feed-section">
                <div class="create-post-card">
                    <h2 class="post-prompt">> Qual foi o bug de hoje?</h2>
                    <button class="btn-postar">Postar</button>
                </div>

                <div class="feed-scroll">
                    <article class="post-card">
                        <header class="post-header">
                            <div class="post-user-avatar"></div>
                            <span class="post-user-name">davi cagnato</span>
                        </header>
                        
                        <div class="post-content-box">
                            <p class="post-text">
                                Alguém sabe como que faz pra debugar o código de python no IntelliJ??? <br><br>
                                Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
                            </p>
                        </div>

                        <footer class="post-footer">
                            <div class="post-votes">
                                <div class="vote-arrow upvote" aria-label="Upvote"></div>
                                <span class="vote-count">0</span>
                                <div class="vote-arrow downvote" aria-label="Downvote"></div>
                            </div>
                            <div class="post-reactions">
                                <span class="reaction-count">4</span>
                                <span class="reaction-icon">💡</span>
                            </div>

                        </footer>
                    </article>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
