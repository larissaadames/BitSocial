<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBit - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <header class="app-header">
        <div class="header-container">
            <a href="index.html" class="logo-section logo-link">
                <span class="logo-text">Social</span>
                <img src="../img/bitLampada.png" alt="Bug BitSocial" class="logo-icon-img">
            </a>
            <div class="search-section">
                <input type="text" placeholder="Pesquisar usuários..." class="search-bar" id="main-search">
                <div class="search-results" id="search-results"></div>
            </div>

            <div class="user-menu-wrapper">
                <div class="header-user-avatar" id="header-avatar"></div>

                <div id="user-dropdown" class="dropdown-menu">
                    <a href="../perfil/perfil.html" class="dropdown-item">Acessar Perfil</a>
                    <button id="btn-logout-trigger" class="dropdown-item logout-style">Sair</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="home-grid">
            
            <nav class="nav-sidebar">
                <div class="nav-item active" data-target="home">
                    <span class="nav-icon">🏠</span> Página Inicial
                </div>
                <div class="nav-item" data-target="saved">
                    <span class="nav-icon">🔖</span> Salvos
                </div>
                <div class="nav-placeholder"></div>
                <div class="nav-placeholder"></div>
            </nav>

            <section class="feed-section">
                <div class="create-post-card" id="create-post-card">
                    <div class="create-post-top">
                        <h2 class="post-prompt">> Qual foi o bug de hoje?</h2>
                        <button class="btn-postar" id="btn-toggle-post" type="button">Postar</button>
                    </div>

                    <form class="post-composer is-hidden" id="post-composer-form">
                        <textarea
                            id="post-content"
                            class="composer-input"
                            maxlength="500"
                            placeholder="Compartilhe seu bug, dica ou duvida com a comunidade..."
                        ></textarea>

                        <div class="composer-actions">
                            <span class="composer-counter" id="post-counter">0/500</span>
                            <button class="btn-cancel-post" id="btn-cancel-post" type="button">Cancelar</button>
                            <button class="btn-send-post" id="btn-send-post" type="submit">Publicar</button>
                        </div>
                    </form>
                </div>

                <div class="feed-scroll" id="feed-scroll">
                    <p class="feed-loading">Carregando posts...</p>
                </div>
            </section>
        </div>
    </main>

    <div id="logout-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Deseja mesmo sair?</h3>
            <p>Você precisará fazer login novamente para postar e votar.</p>
            <div class="modal-actions">
                <button id="confirm-logout" class="btn-confirm">Sim, Sair</button>
                <button id="cancel-logout" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
