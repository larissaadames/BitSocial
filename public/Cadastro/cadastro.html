<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-geo">
        <div class="b b1"></div>
        <div class="b b2"></div>
        <div class="b b3"></div>
        <div class="b b4"></div>
        <div class="b b5"></div>
        <div class="b b6"></div>
        <div class="b b7"></div>
        <div class="b b8"></div>
        <div class="b b9"></div>
    </div>
    <div class="registration-card">
      <div class="illustrations-side">
          <img src="../img/bitLampada.png" alt="bit" class="img-character">
      </div>

      <div class="form-side">
          <h1>Cadastro</h1>

          <form id="form-cadastro">
              <div class="form-grid">
                  
                  <div class="input-group">
                      <label for="nome">Nome</label>
                      <input
                        type="text"
                        id="nome"
                        minlength="2"
                        maxlength="15"
                        pattern="[A-Za-zÀ-ÿ\s]+"
                        title="Use apenas letras"
                        required
                        placeholder="Jorge"
                      />
                  </div>

                  <div class="input-group">
                      <label for="sobrenome">Sobrenome</label>
                      <input
                        type="text"
                        id="sobrenome"
                        minlength="2"
                        maxlength="20"
                        pattern="[A-Za-zÀ-ÿ\s]+"
                        title="Use apenas letras"
                        placeholder="Jacinto"
                      />
                  </div>

                  <div class="input-group full-width">
                      <label for="email">E-mail</label>
                      <input
                        type="email"
                        id="email"
                        required
                        placeholder="exemplo@email.com"
                      />
                  </div>

                  <div class="input-group">
                      <label for="dt-nasc">Data de Nascimento</label>
                      <input type="date" id="dt-nasc" min="required"/>
                  </div>

                  <div class="input-group">
                      <label for="usuario">Usuário</label>
                      <input
                        type="text"
                        id="usuario"
                        minlength="4"
                        maxlength="26"
                        pattern="^@[a-zA-Z0-9_]{4,26}$"
                        title="Comece com @ e use de 3 a 25 caracteres"
                        placeholder="@usuario"
                        required
                      />
                  </div>

                  <div class="input-group full-width">
                      <label for="telefone">Telefone</label>
                      <input
                        type="tel"
                        id="telefone"
                        maxlength="15"
                        placeholder="(00) 00000-0000"
                        required
                      />
                  </div>

                    <div class="input-group full-width">
                        <label for="senha">Senha</label>
                        <div class="password-field">
                            <input
                                type="password"
                                id="senha"
                                pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
                                title="Mínimo 8 caracteres, com letra maiúscula, minúscula, número e símbolo."
                                required
                                placeholder="••••••••"
                            />
                            <button type="button" onclick="togglePassword('senha', this)">👁</button>
                        </div>

                        </div>
                            <ul class="password-checklist" id="password-checklist">
                                <li id="rule-len">Mínimo 8 caracteres</li>
                                <li id="rule-upper">Letra maiúscula</li>
                                <li id="rule-lower">Letra minúscula</li>
                                <li id="rule-num">Número</li>
                                <li id="rule-symbol">Símbolo (@$!%*?&)</li>
                            </ul>
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label for="senha-confirmar">Confirmar senha</label>
                        <div class="password-field">
                            <input
                                type="password"
                                id="senha-confirmar"
                                required
                                placeholder="••••••••"
                            />
                            <button type="button" onclick="togglePassword('senha-confirmar', this)">👁</button>
                        </div>
                    </div>
              </div>

              <button type="submit" class="btn-submit">Criar Conta</button>
              
              <div class="login-link">
                  <a href="../Login/login.html">➔ Já possui uma conta?</a>
              </div>
          </form>
      </div>
  </div>

    <script src="script.js"></script>
  </body>
</html>
