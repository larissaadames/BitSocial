<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Moth System</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="registration-card">
      <h1>Criar Conta</h1>

      <form id="form-cadastro">
        <div class="form-grid">
          <div class="input-group">
            <label for="nome">Nome</label>
            <input
              type="text"
              id="nome"
              minlength="2"
              pattern="[A-Za-zÀ-ÿ\s]+"
              title="Use apenas letras"
              required
              placeholder="Jorge"
            />
          </div>

          <div class="input-group">
            <label for="sobrenome">Sobrenome</label>
            <input
              type="text"
              id="sobrenome"
              minlength="2"
              pattern="[A-Za-zÀ-ÿ\s]+"
              title="Use apenas letras"
              placeholder="Jacinto"
            />
          </div>

          <div class="input-group">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              required
              placeholder="exemplo@email.com"
            />
          </div>

          <div class="input-group">
            <label for="dt-nasc">Data de Nascimento</label>
            <input type="date" id="dt-nasc" required />
          </div>

          <div class="input-group">
            <label for="usuario">Usuário</label>
            <input
              type="text"
              id="usuario"
              pattern="^@[a-zA-Z0-9_]{3,15}$"
              title="Comece com @ e use de 3 a 15 caracteres"
              placeholder="@usuario"
              required
            />
          </div>

          <div class="input-group">
            <label for="telefone">Telefone</label>
            <input
              type="tel"
              id="telefone"
              pattern="[0-9]{10,11}"
              placeholder="(00) 00000-0000"
              required
            />
          </div>

          <div class="input-group">
            <label for="senha">Senha</label>
            <input
              type="password"
              id="senha"
              pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
              title="Mínimo 8 caracteres, com letra maiúscula, minúscula, número e símbolo."
              required
              placeholder="••••••••"
            />
          </div>

          <div class="input-group">
            <label for="senha-confirmar">Confirmar senha</label>
            <input
              type="password"
              id="senha-confirmar"
              required
              placeholder="••••••••"
            />
          </div>
        </div>

        <button type="submit" class="btn-submit">Finalizar Cadastro</button>
      </form>
    </div>

    <script>
      const senha = document.getElementById("senha");
      const confirmarSenha = document.getElementById("senha-confirmar");

      function validarSenha() {
        if (senha.value !== confirmarSenha.value) {
          confirmarSenha.setCustomValidity("As senhas não coincidem!");
        } else {
          confirmarSenha.setCustomValidity("");
        }
      }

      senha.onchange = validarSenha;
      confirmarSenha.onkeyup = validarSenha;
    </script>
  </body>
</html>
