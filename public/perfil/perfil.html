<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBit - Perfil</title>
    <link rel="stylesheet" href="style.css?v=20260419b">
</head>
<body class="dark-theme">

    <div id="notification-container"></div>

    <header class="app-header">
        <div class="header-container">
            <a href="../home/index.html" class="logo-section logo-link">
                <span class="logo-text">Social</span>
                <img src="../img/bitLampada.png" alt="Logo SocialBit" class="logo-icon-img">
            </a>
            
            <div class="search-section">
                <input type="text" placeholder="Pesquisar usuários..." class="search-bar" id="search-bar">
                <div id="search-results" class="search-results"></div>
            </div>

            <div class="user-menu-wrapper">
                <div class="header-user-avatar" id="header-avatar"></div>
                
                <div id="user-dropdown" class="dropdown-menu">
                    <a href="perfil.html" class="dropdown-item">Acessar Perfil</a>
                    <button id="btn-logout-trigger" class="dropdown-item logout-style">Sair</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="profile-container">
            <section class="profile-card">
                <div class="profile-main-info">
                    <div class="avatar-wrapper" id="avatar-wrapper">
                        <div class="profile-avatar-large" id="display-avatar"></div>
                        <div class="avatar-overlay" id="avatar-overlay">Trocar Foto</div>
                    </div>
                    
                    <div id="view-mode" class="info-text-section">
                        <h1 id="display-nome-completo">Carregando...</h1>
                        <p id="display-username">@usuario</p>
                        <div class="bio-box">
                            <p id="display-bio">> Olá! Bem-vindo ao meu SocialBit.</p>
                        </div>
                        <div class="extra-info">
                            <span id="display-telefone" class="info-item"></span>
                            <span id="display-dtNasc" class="info-item"></span>
                        </div>
                        <button id="btn-edit-perfil" class="btn-primary" style="display: none;">Editar Perfil</button>
                    </div>

                    <div id="edit-mode" class="info-edit-section" style="display: none;">
                        <h2 class="edit-title">Atualizar Perfil</h2>
                        <div class="input-group">
                            <div class="input-wrapper">
                                <label>Nome</label>
                                <input type="text" id="edit-nome" maxlength="50">
                            </div>
                            <div class="input-wrapper">
                                <label>Sobrenome</label>
                                <input type="text" id="edit-sobrenome" maxlength="50">
                            </div>
                        </div>
                        <div class="input-group">
                            <div class="input-wrapper">
                                <label>Telefone</label>
                                <input type="text" id="edit-telefone" placeholder="(00) 00000-0000">
                            </div>
                            <div class="input-wrapper">
                                <label>Data de Nascimento</label>
                                <input type="date" id="edit-dtNasc">
                            </div>
                        </div>
                        <div class="input-wrapper">
                            <label>Biografia (Máx. 255 caracteres)</label>
                            <textarea id="edit-bio" maxlength="255"></textarea>
                        </div>
                        <div class="edit-actions">
                            <button id="btn-save-perfil" class="btn-save">Salvar Alterações</button>
                            <button id="btn-cancel-edit" class="btn-cancel">Cancelar</button>
                            <button type="button" id="delete-account-btn" class="btn-danger">Excluir Minha Conta</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="delete-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h3 class="error-text">⚠️ Excluir Conta?</h3>
        <p>Essa ação é definitiva e apagará todos os seus dados.</p>
        <div class="modal-actions">
            <button type="button" id="confirm-delete" class="btn-confirm-danger">Sim, Excluir</button>
            <button id="cancel-delete" class="btn-cancel">Cancelar</button>
        </div>
    </div>
    </div>

    <div id="logout-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Deseja mesmo sair?</h3>
            <p>Você precisará fazer login novamente para postar e votar.</p>
            <div class="modal-actions">
                <button id="confirm-logout" class="btn-confirm">Sim, Sair</button>
                <button id="cancel-logout" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display: none;">
    <script src="script.js"></script>
</body>
</html>
