<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBit - Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <header class="app-header">
        <div class="header-container">
            <a href="../home/index.html" class="logo-section">
                <span class="logo-text">Social</span>
                <img src="../img/bitLampada.png" alt="Logo BitSocial" class="logo-icon-img">
            </a>
            <div class="search-section">
                <input type="text" placeholder="Pesquisar usuários..." class="search-bar" id="main-search">
            </div>
            <a href="perfil.html" class="user-section">
                <div class="header-user-avatar"></div>
            </a>
        </div>
    </header>

    <main class="main-content">
        <div class="profile-container">
            
            <section class="profile-card">
                <div class="profile-header-main">
                    <div class="profile-avatar-large" id="display-avatar"></div>
                    
                    <div class="profile-view-mode" id="view-mode">
                        <h1 id="display-nome-completo">Carregando...</h1>
                        <p id="display-username">@usuario</p>
                        
                        <div class="bio-container">
                            <p id="display-bio">> Olá, mundo! Bem-vindo ao meu perfil.</p>
                        </div>

                        <button id="btn-edit-perfil" class="btn-edit">Editar Perfil</button>
                    </div>

                    <div class="profile-edit-mode" id="edit-mode">
                        <h2 class="edit-title">Editar Informações</h2>
                        
                        <div class="edit-group">
                            <label for="edit-nome">Nome</label>
                            <input type="text" id="edit-nome" placeholder="Seu nome">
                        </div>

                        <div class="edit-group">
                            <label for="edit-sobrenome">Sobrenome</label>
                            <input type="text" id="edit-sobrenome" placeholder="Seu sobrenome">
                        </div>

                        <div class="edit-group">
                            <label for="edit-bio">Bio (Biografia)</label>
                            <textarea id="edit-bio" rows="4" placeholder="Fale um pouco sobre você ou seus bugs favoritos..."></textarea>
                        </div>

                        <div class="edit-actions">
                            <button id="btn-save-perfil" class="btn-save">Salvar Alterações</button>
                            <button onclick="window.location.reload()" class="btn-cancel">Cancelar</button>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
