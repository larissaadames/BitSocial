<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBit - Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <header class="app-header">
        <div class="header-container">
            <a href="../home/index.html" class="logo-section">
                <span class="logo-text">Social</span>
                <img src="../img/bitLampada.png" alt="Logo SocialBit" class="logo-icon-img">
            </a>
            
            <div class="search-section">
                <input type="text" placeholder="Pesquisar usuários..." class="search-bar" id="search-bar">
                <div id="search-results" class="search-results-box"></div>
            </div>

            <a href="perfil.html" class="user-section">
                <div class="header-user-avatar" id="header-avatar"></div>
            </a>
        </div>
    </header>

    <main class="main-content">
        <div class="profile-container">
            
            <section class="profile-card">
                <div class="profile-main-info">
                    <div class="avatar-wrapper">
                        <div class="profile-avatar-large" id="display-avatar"></div>
                        <div class="avatar-overlay" id="avatar-overlay">Trocar Foto</div>
                    </div>
                    
                    <div id="view-mode" class="info-text-section">
                        <h1 id="display-nome-completo">Carregando...</h1>
                        <p id="display-username">@usuario</p>
                        
                        <div class="bio-box">
                            <p id="display-bio">> Olá! Bem-vindo ao meu SocialBit.</p>
                        </div>

                        <div class="extra-info">
                            <span id="display-telefone"></span>
                            <span id="display-dtNasc"></span>
                        </div>

                        <button id="btn-edit-perfil" class="btn-primary" style="display: none;">Editar Perfil</button>
                    </div>

                    <div id="edit-mode" class="info-edit-section" style="display: none;">
                        <h2 class="edit-title">Atualizar Perfil</h2>
                        
                        <div class="input-group">
                            <input type="text" id="edit-nome" placeholder="Nome">
                            <input type="text" id="edit-sobrenome" placeholder="Sobrenome">
                        </div>

                        <div class="input-group">
                            <input type="text" id="edit-telefone" placeholder="Telefone">
                            <input type="date" id="edit-dtNasc">
                        </div>

                        <textarea id="edit-bio" placeholder="Sua biografia..."></textarea>

                        <div class="edit-actions">
                            <button id="btn-save-perfil" class="btn-save">Salvar Alterações</button>
                            <button id="btn-cancel-edit" class="btn-cancel">Cancelar</button>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <input type="file" id="file-input" accept="image/*" style="display: none;">

    <script src="script.js"></script>
</body>
</html>
