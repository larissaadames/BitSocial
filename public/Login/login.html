<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Login</title>
  </head>
  <body>
    <!-- <div class="bg-shape shape-1"></div>
                    <div class="bg-shape shape-2"></div>
                    <div class="bg-shape shape-3"></div> -->
    <div class="bg-geo">
      <div class="b b1"></div>
      <div class="b b2"></div>
      <div class="b b3"></div>
      <div class="b b4"></div>
      <div class="b b5"></div>
      <div class="b b6"></div>
      <div class="b b7"></div>
      <div class="b b8"></div>
      <div class="b b9"></div>
    </div>

    <main class="login-container">
      <h1 class="title">Login</h1>

      <div class="content">
        <div class="illustration">
          <img src="/public/img/bitCafé.png" alt="Ilustração da Bit" />
        </div>

        <form class="login-form">
          <div class="input-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="exemplo@email.com"
            />
          </div>

          <div class="input-group">
            <label for="password">Senha</label>

            <div class="password-field">
              <input
                type="password"
                id="password"
                name="password"
                pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
                title="Mínimo 8 caracteres, com letra maiúscula, minúscula, número e símbolo."
                placeholder="••••••••"
              />

              <button type="button" onclick="togglePassword()">👁</button>
            </div>
          </div>

          <a href="#" class="forgot-password">Esqueceu a senha?</a>

          <button type="submit" class="btn btn-primary">
            Log in
            <img src="../img/pixelarrow.png" alt="seta" class="btn-arrow" />
          </button>

          <p class="separator">ou</p>

          <a href="../Cadastro/cadastro.html">
            <button type="button" class="btn btn-secondary">Criar conta</button>
          </a>
        </form>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
